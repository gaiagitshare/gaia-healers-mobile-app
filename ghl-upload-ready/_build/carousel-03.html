<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carousel 03</title>
  <link rel="stylesheet" href="ghl-carousel.css" />
</head>
<body>
  <div class="canvas-carousel">
    <div class="bg bg-03"></div>
    <div class="content">
      <img class="mark" src="assets/gaia-icon.png" alt="" width="40" height="40" />
      <p class="eyebrow">Gaia Academy</p>
      <h1 class="headline">Become a Gaia Healer</h1>
      <p class="sub">Earn credentials from <strong>BIO-WELL Orientation</strong> through <strong>Advanced Level 2</strong>.</p>
      <div class="visual">
        <div class="path">
          <span class="step done">Orientation</span>
          <span class="step done">Basic</span>
          <span class="step current">Adv. L1</span>
          <span class="step locked">Adv. L2</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
