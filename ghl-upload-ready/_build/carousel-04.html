<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carousel 04</title>
  <link rel="stylesheet" href="ghl-carousel.css" />
</head>
<body>
  <div class="canvas-carousel">
    <div class="bg bg-04"></div>
    <div class="content">
      <img class="mark" src="assets/gaia-icon.png" alt="" width="40" height="40" />
      <p class="eyebrow">Global network</p>
      <h1 class="headline">Join the global network</h1>
      <p class="sub">Modality communities, practitioner directory, and live trainings with faculty worldwide.</p>
      <div class="visual">
        <div class="network">
          <div class="stat">1,233+</div>
          <div class="label">Practitioners in the Gaia ecosystem</div>
          <div class="dots" aria-hidden="true">
            <span class="dot-node"></span><span class="dot-node"></span><span class="dot-node"></span><span class="dot-node"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
