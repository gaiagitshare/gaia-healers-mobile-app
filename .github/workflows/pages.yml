name: Deploy static prototype to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Register gaiahealers.app and request HTTPS certificate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          HDR=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          echo "Pages config:"
          curl -sS "${HDR[@]}" "$API" | tee pages.json || true

          echo "Requesting Pages build (re-triggers domain + certificate check)..."
          curl -sS -X POST "${HDR[@]}" "$API/builds" | tee pages-build.json || true

          echo "Re-registering custom domain gaiahealers.app..."
          HTTP_CODE="$(curl -sS -o pages-patch.json -w "%{http_code}" -X PATCH "${HDR[@]}" "$API" \
            -d '{"cname":"gaiahealers.app"}')"
          echo "PATCH HTTP ${HTTP_CODE}"
          cat pages-patch.json || true

          if [ "$HTTP_CODE" = "200" ]; then
            STATE="$(python3 -c "import json; d=json.load(open('pages-patch.json')); print((d.get('https_certificate') or {}).get('state',''))" 2>/dev/null || echo '')"
            echo "Certificate state: ${STATE:-unknown}"
            if [ "$STATE" = "approved" ] || [ "$STATE" = "issued" ]; then
              curl -sS -X PATCH "${HDR[@]}" "$API" \
                -d '{"cname":"gaiahealers.app","https_enforced":true}' | tee pages-https.json || true
              echo "HTTPS enforcement requested."
            fi
          fi
